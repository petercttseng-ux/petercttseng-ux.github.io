<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臺灣魚鄉好風情</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0d1f35;--deep:#0a1928;--ocean:#0f2d4a;--wave:#143e62;
  --glass:rgba(10,28,48,0.82);--glass2:rgba(15,45,74,0.92);
  --teal:#00c9a7;--teal2:#00e5c0;--coral:#ff6b4a;--gold:#f5c842;--sky:#4fc3f7;
  --text:#ddeef8;--text-dim:#6b9ab8;--text-soft:#a8cce0;
  --border:rgba(0,201,167,0.18);--border2:rgba(79,195,247,0.22);
  --shadow:0 8px 32px rgba(0,0,0,0.5);--shadow-sm:0 4px 16px rgba(0,0,0,0.35);
  --r:12px;--r-sm:7px;
  --font-tc:"Noto Serif TC",serif;--font-body:"Noto Sans TC",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font-body);background:var(--deep);color:var(--text)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--ocean)}
::-webkit-scrollbar-thumb{background:var(--teal);border-radius:3px}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;background:var(--deep);overflow:hidden}
.auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 20% 30%,rgba(0,201,167,0.08),transparent 60%),linear-gradient(160deg,#060f1c,#0a1f38 50%,#071422)}
.fish-deco{position:absolute;animation:swim 18s ease-in-out infinite;opacity:0.15;pointer-events:none}
.fish-deco:nth-child(1){top:15%;left:-5%;animation-delay:0s}
.fish-deco:nth-child(2){top:55%;left:-5%;animation-delay:-6s}
.fish-deco:nth-child(3){top:80%;left:-5%;animation-delay:-12s}
@keyframes swim{0%{transform:translateX(0)}50%{transform:translateX(calc(100vw + 80px))}50.01%{transform:translateX(calc(100vw + 80px)) scaleX(-1);opacity:0}50.02%{transform:translateX(-80px) scaleX(-1);opacity:0.15}100%{transform:translateX(0) scaleX(-1)}}
.auth-card{position:relative;z-index:2;width:430px;max-width:95vw;background:var(--glass2);border:1px solid var(--border);border-radius:20px;padding:38px 36px 30px;box-shadow:var(--shadow),0 0 80px rgba(0,201,167,0.06);backdrop-filter:blur(20px);animation:cardIn .6s cubic-bezier(.22,1,.36,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.auth-logo{text-align:center;margin-bottom:22px}
.auth-logo img{width:80px;height:80px;object-fit:contain;border-radius:50%;animation:bob 3s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(0,201,167,0.35))}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.auth-logo h1{font-family:var(--font-tc);font-size:1.7rem;font-weight:900;color:var(--teal);margin-top:8px;letter-spacing:.05em;text-shadow:0 0 30px rgba(0,201,167,0.4)}
.auth-logo p{font-size:.75rem;color:var(--text-dim);margin-top:3px;letter-spacing:.08em}
.auth-tabs{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:22px}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .25s;background:transparent;color:var(--text-dim);border:none;font-family:var(--font-body)}
.auth-tab.active{background:var(--teal);color:var(--deep);font-weight:700}
.field{margin-bottom:13px}
.field label{display:block;font-size:.72rem;color:var(--text-dim);margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
.field input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:.9rem;font-family:var(--font-body);outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,201,167,0.15)}
.field input::placeholder{color:var(--text-dim);opacity:.6}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 22px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:.9rem;transition:all .2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--teal),#00a889);color:var(--deep);width:100%;padding:12px;font-size:.95rem;box-shadow:0 4px 20px rgba(0,201,167,0.3)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 28px rgba(0,201,167,0.45)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text-soft)}
.btn-ghost:hover{background:rgba(255,255,255,0.06);border-color:var(--teal);color:var(--teal)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.auth-msg{min-height:20px;font-size:.8rem;text-align:center;margin-bottom:12px;border-radius:6px;padding:0 8px}
.auth-msg.error{color:#ff6b6b;background:rgba(255,107,107,0.1);padding:8px}
.auth-msg.success{color:var(--teal);background:rgba(0,201,167,0.1);padding:8px}

/* ── MAIN APP ── */
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}
#topnav{height:54px;flex-shrink:0;background:var(--glass2);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);display:flex;align-items:center;padding:0 16px;gap:12px;position:relative;z-index:900}
.nav-logo{font-family:var(--font-tc);font-size:1.1rem;font-weight:900;color:var(--teal);letter-spacing:.04em;display:flex;align-items:center;gap:8px;white-space:nowrap}
.nav-logo img{width:34px;height:34px;object-fit:contain;border-radius:50%}
.nav-spacer{flex:1}
.nav-user{display:flex;align-items:center;gap:10px;font-size:.82rem;color:var(--text-soft)}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--sky));display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:var(--deep)}

/* DB status badge */
.db-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.7rem;background:rgba(0,201,167,0.1);border:1px solid var(--border);color:var(--teal)}
.db-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#main-body{flex:1;display:flex;overflow:hidden;position:relative}
#map{flex:1;height:100%}
.leaflet-container{background:#0a2a4a!important}

/* ── SIDEBAR ── */
#sidebar{width:360px;flex-shrink:0;background:var(--glass2);border-left:1px solid var(--border);display:flex;flex-direction:column;backdrop-filter:blur(16px);transition:width .3s cubic-bezier(.4,0,.2,1);position:relative;z-index:10}
#sidebar.collapsed{width:0;overflow:hidden}
.sidebar-header{padding:13px 14px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-header h2{font-family:var(--font-tc);font-size:.95rem;font-weight:700;color:var(--gold);flex:1}
.view-toggle{display:flex;background:rgba(255,255,255,0.05);border-radius:6px;overflow:hidden;flex-shrink:0}
.view-btn{padding:5px 12px;font-size:.73rem;cursor:pointer;background:transparent;border:none;color:var(--text-dim);font-family:var(--font-body);transition:all .2s}
.view-btn.active{background:var(--teal);color:var(--deep);font-weight:600}
.upload-zone{margin:11px;border:2px dashed var(--border2);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(255,255,255,0.02);flex-shrink:0}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--teal);background:rgba(0,201,167,0.06);box-shadow:0 0 20px rgba(0,201,167,0.1)}
.upload-zone .uz-icon img{width:36px;height:36px;opacity:.7;border-radius:50%}
.upload-zone strong{font-size:.83rem;color:var(--teal);display:block;margin:6px 0 3px}
.upload-zone p{font-size:.73rem;color:var(--text-dim)}
#photo-list{flex:1;overflow-y:auto;padding:5px 9px 10px}
.photo-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;overflow:hidden;cursor:pointer;transition:all .2s;display:flex}
.photo-card:hover{border-color:var(--teal);background:rgba(0,201,167,0.06);transform:translateX(-2px);box-shadow:4px 0 0 var(--teal) inset}
.photo-thumb{width:72px;height:72px;flex-shrink:0;object-fit:cover;background:var(--wave);display:flex;align-items:center;justify-content:center}
.photo-thumb img{width:72px;height:72px;object-fit:cover;display:block}
.photo-info{padding:8px 10px;flex:1;min-width:0}
.photo-name{font-size:.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-gps{font-size:.7rem;margin-top:3px}.gps-ok{color:var(--teal)}.gps-none{color:var(--text-dim)}
.photo-meta{font-size:.68rem;color:var(--text-dim);margin-top:3px}
.photo-desc{font-size:.7rem;color:var(--text-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-actions{display:flex;align-items:center;padding:0 8px 0 0;gap:4px;flex-shrink:0}
.del-btn{width:28px;height:28px;border-radius:6px;background:rgba(255,107,74,0.12);border:1px solid rgba(255,107,74,0.2);color:var(--coral);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.del-btn:hover{background:rgba(255,107,74,0.25)}
.locate-btn{width:28px;height:28px;border-radius:6px;background:rgba(0,201,167,0.1);border:1px solid rgba(0,201,167,0.2);color:var(--teal);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.locate-btn:hover{background:rgba(0,201,167,0.22)}
.empty-state{text-align:center;padding:36px 20px;color:var(--text-dim)}
.empty-state img{width:54px;opacity:.25;border-radius:50%;margin-bottom:10px}
.empty-state p{font-size:.82rem;line-height:1.6}
.stats-bar{padding:8px 14px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:14px;font-size:.72rem;color:var(--text-dim)}
.stat-item{display:flex;align-items:center;gap:5px}
.stat-dot{width:7px;height:7px;border-radius:50%;background:var(--teal)}
#toggle-sidebar{position:absolute;left:-38px;top:50%;transform:translateY(-50%);width:38px;height:56px;z-index:20;background:var(--glass2);border:1px solid var(--border);border-right:none;border-radius:10px 0 0 10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--teal);transition:all .2s;backdrop-filter:blur(12px)}
#toggle-sidebar:hover{background:rgba(0,201,167,0.12)}

/* ── MAP CONTROLS ── */
.map-overlay-btns{position:absolute;top:12px;left:12px;z-index:500;display:flex;flex-direction:column;gap:8px}
.map-ctrl-btn{width:38px;height:38px;border-radius:9px;background:var(--glass2);border:1px solid var(--border);color:var(--teal);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);transition:all .2s;box-shadow:var(--shadow-sm)}
.map-ctrl-btn:hover{background:rgba(0,201,167,0.15);border-color:var(--teal)}
#tile-select{position:absolute;top:12px;left:60px;z-index:500;background:var(--glass2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:.75rem;color:var(--text);backdrop-filter:blur(12px);cursor:pointer;outline:none;font-family:var(--font-body)}
#tile-select option{background:var(--deep)}

/* ── UPLOAD MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:8000;background:rgba(5,14,26,0.88);display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:#0d2240;border:1px solid var(--border2);border-radius:18px;padding:26px;width:540px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow);animation:modalIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(20px)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-header h3{font-family:var(--font-tc);font-size:1.1rem;color:var(--teal);display:flex;align-items:center;gap:8px}
.modal-header h3 img{width:28px;height:28px;border-radius:50%;object-fit:contain}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(255,107,74,0.15);color:var(--coral)}
#modal-drop-area{border:2px dashed var(--border2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(255,255,255,0.02);margin-bottom:14px;min-height:100px}
#modal-drop-area:hover,#modal-drop-area.drag-over{border-color:var(--teal);background:rgba(0,201,167,0.05)}
#drop-hint .drop-icon img{width:44px;height:44px;border-radius:50%;opacity:.65;margin-bottom:8px}
#drop-hint strong{color:var(--teal);font-size:.88rem;display:block;margin-bottom:3px}
#drop-hint p{font-size:.74rem;color:var(--text-dim)}
#queue-grid{display:none;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px;max-height:280px;overflow-y:auto;padding:2px}
.queue-item{position:relative;background:var(--wave);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;animation:queueIn .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes queueIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:none}}
.queue-thumb{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.queue-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(6,18,32,0.92),transparent);padding:20px 6px 5px}
.queue-name{font-size:.62rem;color:var(--text-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.queue-gps{font-size:.6rem;margin-top:2px}.queue-gps.ok{color:var(--teal)}.queue-gps.none{color:var(--gold)}
.queue-remove{position:absolute;top:3px;right:3px;width:19px;height:19px;border-radius:50%;background:rgba(255,71,87,0.85);border:none;cursor:pointer;color:#fff;font-size:.65rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.queue-remove:hover{background:var(--coral);transform:scale(1.15)}
.queue-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,25,42,0.7)}
#batch-gps-summary{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 10px}
.batch-stat{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.73rem}
.batch-stat.all{background:rgba(79,195,247,0.08);color:var(--sky);border:1px solid rgba(79,195,247,0.2)}
.batch-stat.gps-ok{background:rgba(0,201,167,0.1);color:var(--teal);border:1px solid rgba(0,201,167,0.25)}
.batch-stat.gps-none{background:rgba(245,200,66,0.08);color:var(--gold);border:1px solid rgba(245,200,66,0.2)}
.field-inline{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px}
.field-inline .field{flex:1;margin-bottom:0}
#upload-progress-wrap{display:none;margin:10px 0}
#upload-progress-wrap.show{display:block}
.progress-bar-track{height:6px;background:var(--wave);border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--sky));border-radius:3px;transition:width .3s ease}
.progress-label{font-size:.75rem;color:var(--text-dim);text-align:center}
.divider{height:1px;background:var(--border);margin:12px 0}

/* ── LIGHTBOX ── */
#lightbox{position:fixed;inset:0;z-index:9500;background:rgba(4,12,22,0.96);display:none;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(10px)}
#lightbox.open{display:flex;animation:fadeIn .25s}
#lb-img{max-width:90vw;max-height:78vh;border-radius:12px;box-shadow:var(--shadow);cursor:zoom-in;transition:transform .3s cubic-bezier(.4,0,.2,1);transform-origin:center;user-select:none}
#lb-img.zoomed{cursor:zoom-out}
#lb-info{margin-top:14px;text-align:center;max-width:600px}
#lb-info h4{font-family:var(--font-tc);color:var(--text);font-size:1rem}
#lb-info p{font-size:.8rem;color:var(--text-dim);margin-top:4px}
#lb-gps{font-size:.78rem;color:var(--teal);margin-top:4px}
.lb-controls{position:fixed;top:14px;right:14px;display:flex;gap:8px}
.lb-btn{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:var(--text);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.lb-btn:hover{background:rgba(255,255,255,0.2)}
.zoom-hint{font-size:.7rem;color:var(--text-dim);margin-top:7px}

/* ── Leaflet custom ── */
.leaflet-popup-content-wrapper{background:var(--ocean)!important;border:1px solid var(--border)!important;border-radius:var(--r)!important;box-shadow:var(--shadow)!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--ocean)!important}
.leaflet-popup-content{margin:10px 14px!important}
.popup-inner{cursor:pointer}
.popup-img{width:180px;height:110px;object-fit:cover;border-radius:6px;display:block;margin-bottom:8px}
.popup-img-ph{width:180px;height:80px;display:flex;align-items:center;justify-content:center;background:var(--wave);border-radius:6px;margin-bottom:8px}
.popup-img-ph img{width:48px;height:48px;border-radius:50%;opacity:.45;object-fit:contain}
.popup-name{font-weight:600;font-size:.85rem;color:var(--text)}
.popup-gps{font-size:.72rem;color:var(--teal);margin-top:3px}
.popup-desc{font-size:.72rem;color:var(--text-soft);margin-top:3px}
.popup-hint{font-size:.68rem;color:var(--text-dim);margin-top:6px;text-align:center}

/* spinner */
.spinner{width:17px;height:17px;border:2px solid rgba(0,201,167,0.2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* DB info panel */
.db-info-panel{position:absolute;bottom:30px;left:12px;z-index:500;background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:.72rem;color:var(--text-dim);backdrop-filter:blur(12px);max-width:260px;display:none}
.db-info-panel.show{display:block}
.db-info-panel strong{color:var(--teal);display:block;margin-bottom:4px}
.db-row{display:flex;justify-content:space-between;gap:20px;margin-top:3px}
.db-val{color:var(--text-soft)}

@media(max-width:700px){
  #sidebar{width:100%;position:absolute;bottom:0;left:0;height:45vh;border-left:none;border-top:1px solid var(--border)}
  #sidebar.collapsed{height:0;width:100%}
  #toggle-sidebar{left:auto;right:10px;top:-28px;transform:none;width:56px;height:28px;border-radius:10px 10px 0 0;border:1px solid var(--border);border-bottom:none}
}
</style>
</head>
<body>

<!-- ╔═════ AUTH SCREEN ═════╗ -->

<script>
const API = "https://aqua-map-server.onrender.com";

/* ═══════════════════════════════════════
   API HELPERS
═══════════════════════════════════════ */
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json", ...(opts.headers || {}) },
    ...opts
  });
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    throw new Error(j.message || res.statusText);
  }
  return res.json();
}

async function apiPost(path, body) {
  return apiFetch(path, { method: "POST", body: JSON.stringify(body) });
}

async function apiDel(path) {
  return apiFetch(path, { method: "DELETE" });
}

/* ═══════════════════════════════════════
   AUTH
═══════════════════════════════════════ */
let currentUser = null;

function switchTab(mode) {
  document.getElementById('form-login').style.display    = mode === 'login'    ? '' : 'none';
  document.getElementById('form-register').style.display = mode === 'register' ? '' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    mode === 'login');
  document.getElementById('tab-register').classList.toggle('active', mode === 'register');
  setAuthMsg('', '');
}

function setAuthMsg(msg, type) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className   = 'auth-msg' + (type ? ' ' + type : '');
}

async function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  if (!u || !p) return setAuthMsg('請輸入帳號與密碼', 'error');
  setAuthMsg('登入中…', '');
  try {
    const r = await apiPost('/api/login', { username: u, password: p });
    sessionStorage.setItem('tfv_user', JSON.stringify(r.data));
    loginSuccess(r.data);
  } catch(e) { setAuthMsg(e.message || '登入失敗', 'error'); }
}

async function doRegister() {
  const u  = document.getElementById('r-user').value.trim();
  const p  = document.getElementById('r-pass').value;
  const p2 = document.getElementById('r-pass2').value;
  const n  = document.getElementById('r-name').value.trim();
  const em = document.getElementById('r-email').value.trim();

  if (!u || !p || !p2 || !n || !em) return setAuthMsg('所有欄位均為必填', 'error');
  if (!/^[A-Za-z0-9_]{3,20}$/.test(u))       return setAuthMsg('帳號需為 3–20 位英數字或底線', 'error');
  if (p.length < 6)                             return setAuthMsg('密碼至少需 6 個字元', 'error');
  if (p !== p2)                                 return setAuthMsg('兩次密碼不一致', 'error');
  if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) return setAuthMsg('請輸入有效的電子郵件', 'error');
  if (!/[\u4e00-\u9fff]/.test(n))              return setAuthMsg('請輸入中文姓名', 'error');

  setAuthMsg('註冊中…', '');
  try {
    await apiPost('/api/register', { username: u, password: p, fullname: n, email: em });
    setAuthMsg('✓ 註冊成功！請登入', 'success');
    setTimeout(() => switchTab('login'), 1200);
  } catch(e) { setAuthMsg(e.message || '註冊失敗', 'error'); }
}

function loginSuccess(user) {
  currentUser = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('nav-avatar').textContent = user.fullname.charAt(0);
  document.getElementById('nav-name').textContent   = user.fullname;
  initApp();
}

function doLogout() {
  if (!confirm('確定要登出嗎？')) return;
  sessionStorage.removeItem('tfv_user');
  currentUser = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth-screen').style.display = '';
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
  setAuthMsg('', '');
}

/* ═══════════════════════════════════════
   MAP
═══════════════════════════════════════ */
let map, markerCluster, currentTile;
const markers = {};
let currentView = 'mine';

const TILES = {
  satellite: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr: '© Esri' },
  osm:       { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', attr: '© OpenStreetMap' },
  topo:      { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',   attr: '© OpenTopoMap' },
  dark:      { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', attr: '© CartoDB' }
};

function initMap() {
  map = L.map('map', { zoomControl: false }).setView([23.6978, 120.9605], 8);
  currentTile = L.tileLayer(TILES.satellite.url, { attribution: TILES.satellite.attr, maxZoom: 19 }).addTo(map);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  markerCluster = L.markerClusterGroup({
    iconCreateFunction(cluster) {
      return L.divIcon({
        html: `<div style="background:linear-gradient(135deg,#00c9a7,#00a889);color:#0a1928;font-weight:700;font-size:.85rem;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2.5px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.4)">${cluster.getChildCount()}</div>`,
        className: '', iconSize: [36, 36], iconAnchor: [18, 18]
      });
    }
  });
  map.addLayer(markerCluster);
}

function changeTile(key) {
  if (currentTile) map.removeLayer(currentTile);
  const t = TILES[key];
  currentTile = L.tileLayer(t.url, { attribution: t.attr, maxZoom: 19 }).addTo(map);
}

function makeMarkerIcon() {
  return L.divIcon({
    html: `<div style="width:22px;height:22px;background:linear-gradient(135deg,#00c9a7,#00a889);border:2.5px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 4px 12px rgba(0,0,0,.45)"></div>`,
    className: '', iconSize: [22, 22], iconAnchor: [11, 22], popupAnchor: [0, -24]
  });
}

function addMarker(photo) {
  if (!photo.latitude || !photo.longitude) return;
  const imgSrc  = photo.stored_name ? `${API}/photos/${photo.stored_name}` : null;
  const imgHtml = imgSrc
    ? `<img class="popup-img" src="${imgSrc}" alt="" onclick="openLightboxByPhoto(${JSON.stringify(photo).replace(/"/g,'&quot;')})">`
    : `<div class="popup-img-ph"><img src="${LOGO_B64}" alt=""></div>`;
  const marker = L.marker([photo.latitude, photo.longitude], { icon: makeMarkerIcon() });
  marker.bindPopup(`
    <div class="popup-inner" onclick="openLightboxByPhoto(${JSON.stringify(photo).replace(/"/g,'&quot;')})">
      ${imgHtml}
      <div class="popup-name">📍 ${esc(photo.filename)}</div>
      <div class="popup-gps">${photo.latitude.toFixed(5)}°N &nbsp; ${photo.longitude.toFixed(5)}°E</div>
      ${photo.description ? `<div class="popup-desc">📝 ${esc(photo.description)}</div>` : ''}
      <div class="popup-hint">點擊照片可放大 🔍</div>
    </div>`, { maxWidth: 220 });
  markerCluster.addLayer(marker);
  markers[photo.id] = marker;
}

function removeMarker(id) {
  if (markers[id]) { markerCluster.removeLayer(markers[id]); delete markers[id]; }
}

function clearAllMarkers() {
  Object.values(markers).forEach(m => markerCluster.removeLayer(m));
  Object.keys(markers).forEach(k => delete markers[k]);
}

function fitAllMarkers() {
  const pts = Object.values(markers).map(m => m.getLatLng());
  if (pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.15));
  else map.setView([23.6978, 120.9605], 8);
}

function flyToPhoto(photo) {
  if (!photo.latitude) return;
  map.flyTo([photo.latitude, photo.longitude], 15, { duration: 1.2 });
  setTimeout(() => { if (markers[photo.id]) markers[photo.id].openPopup(); }, 1300);
}

/* ═══════════════════════════════════════
   DB INFO PANEL
═══════════════════════════════════════ */
let dbPanelOpen = false;
function toggleDbPanel() {
  dbPanelOpen = !dbPanelOpen;
  document.getElementById('db-info-panel').classList.toggle('show', dbPanelOpen);
  if (dbPanelOpen) loadDbStats();
}

async function loadDbStats() {
  try {
    const r = await apiFetch('/api/stats');
    const d = r.data;
    document.getElementById('dbi-path').textContent   = d.db_path || '—';
    document.getElementById('dbi-users').textContent  = d.users + ' 人';
    document.getElementById('dbi-photos').textContent = d.photos + ' 張';
    document.getElementById('dbi-gps').textContent    = d.photos_with_gps + ' 張';
    document.getElementById('dbi-size').textContent   = d.total_size_kb + ' KB';
    document.getElementById('dbi-dir').textContent    = d.photos_dir || '—';
  } catch(e) { console.warn('stats:', e.message); }
}

/* ═══════════════════════════════════════
   PHOTO LIST
═══════════════════════════════════════ */
let allPhotos = [];

async function renderPhotoList() {
  const url = currentView === 'all'
    ? '/api/photos?view=all'
    : `/api/photos?view=mine&user_id=${currentUser.id}`;
  try {
    const r = await apiFetch(url);
    allPhotos = r.data || [];
  } catch(e) { allPhotos = []; }

  clearAllMarkers();
  allPhotos.forEach(addMarker);

  const el = document.getElementById('photo-list');
  if (!allPhotos.length) {
    el.innerHTML = `<div class="empty-state">
      <img src="${LOGO_B64}" alt="">
      <p>${currentView === 'mine' ? '尚未上傳任何照片<br>點擊上方區域開始上傳' : '目前沒有任何使用者上傳照片'}</p>
    </div>`;
  } else {
    el.innerHTML = allPhotos.map(p => {
      const imgSrc = p.stored_name ? `${API}/photos/${p.stored_name}` : null;
      const isOwn  = p.user_id === currentUser.id;
      return `
      <div class="photo-card" onclick="flyToPhoto(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        <div class="photo-thumb">
          ${imgSrc
            ? `<img src="${imgSrc}" alt="" loading="lazy">`
            : `<img src="${LOGO_B64}" style="width:40px;height:40px;border-radius:50%;opacity:.45;object-fit:contain">`}
        </div>
        <div class="photo-info">
          <div class="photo-name">${esc(p.filename)}</div>
          <div class="photo-gps ${p.latitude ? 'gps-ok' : 'gps-none'}">
            ${p.latitude ? `📍 ${p.latitude.toFixed(4)}, ${p.longitude.toFixed(4)}` : '📍 無定位資訊'}
          </div>
          <div class="photo-meta">🕐 ${(p.uploaded||'').slice(0,16)}
            ${currentView === 'all' ? ` &nbsp;👤 ${esc(p.fullname||'')}` : ''}
            ${p.filesize ? ` &nbsp;💾 ${(p.filesize/1024).toFixed(0)}KB` : ''}
          </div>
          ${p.description ? `<div class="photo-desc">📝 ${esc(p.description)}</div>` : ''}
        </div>
        <div class="photo-actions">
          ${p.latitude ? `<button class="locate-btn" title="飛到位置" onclick="event.stopPropagation();flyToPhoto(${JSON.stringify(p).replace(/"/g,'&quot;')})">📍</button>` : ''}
          <button class="locate-btn" title="放大照片" onclick="event.stopPropagation();openLightboxByPhoto(${JSON.stringify(p).replace(/"/g,'&quot;')})">🔍</button>
          ${isOwn ? `<button class="del-btn" title="刪除" onclick="event.stopPropagation();deletePhoto(${p.id})">🗑</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  const gpsCount = allPhotos.filter(p => p.latitude).length;
  document.getElementById('stat-count').textContent = `${allPhotos.length} 張照片`;
  document.getElementById('stat-gps').textContent   = `${gpsCount} 有定位`;
}

function switchView(v) {
  currentView = v;
  document.getElementById('vbtn-mine').classList.toggle('active', v === 'mine');
  document.getElementById('vbtn-all').classList.toggle('active',  v === 'all');
  renderPhotoList();
}

async function deletePhoto(photoId) {
  if (!confirm('確定要刪除這張照片嗎？')) return;
  try {
    await apiDel(`/api/photos/${photoId}?user_id=${currentUser.id}`);
    removeMarker(photoId);
    renderPhotoList();
    if (dbPanelOpen) loadDbStats();
  } catch(e) { alert(e.message || '刪除失敗'); }
}

/* ═══════════════════════════════════════
   UPLOAD — MULTI
═══════════════════════════════════════ */
let uploadQueue  = [];
let queueCounter = 0;

function openUploadModal(files) {
  uploadQueue = []; queueCounter = 0;
  document.getElementById('queue-grid').innerHTML     = '';
  document.getElementById('queue-grid').style.display = 'none';
  document.getElementById('drop-hint').style.display  = '';
  document.getElementById('batch-gps-summary').innerHTML = '';
  document.getElementById('upload-desc').value        = '';
  document.getElementById('upload-msg').textContent   = '';
  document.getElementById('upload-btn-text').textContent = '✅ 確認上傳';
  document.getElementById('upload-progress-wrap').classList.remove('show');
  document.getElementById('upload-btn').disabled = false;
  document.getElementById('upload-modal').classList.add('open');
  if (files && files.length) addFilesToQueue(files);
}

function closeUploadModal() {
  document.getElementById('upload-modal').classList.remove('open');
  document.getElementById('file-input').value = '';
}

function handleSidebarDrop(e) {
  e.preventDefault();
  document.getElementById('sidebar-drop').classList.remove('drag-over');
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
  if (files.length) openUploadModal(files);
}

function handleModalDrop(e) {
  e.preventDefault();
  document.getElementById('modal-drop-area').classList.remove('drag-over');
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
  if (files.length) addFilesToQueue(files);
}

function handleFilesSelect(fileList) {
  const files = [...fileList].filter(f => f.type.startsWith('image/'));
  if (files.length) addFilesToQueue(files);
  document.getElementById('file-input').value = '';
}

function addFilesToQueue(files) {
  const grid = document.getElementById('queue-grid');
  grid.style.display = 'grid';
  document.getElementById('drop-hint').style.display = 'none';
  files.forEach(file => {
    const qid   = 'q' + (++queueCounter);
    const entry = { file, previewUrl: null, latitude: null, longitude: null, qid };
    uploadQueue.push(entry);
    const card = document.createElement('div');
    card.className = 'queue-item'; card.id = qid;
    card.innerHTML = `<div class="queue-loading"><span class="spinner"></span></div>
      <button class="queue-remove" onclick="removeFromQueue('${qid}')">✕</button>`;
    grid.appendChild(card);
    const reader = new FileReader();
    reader.onload = ev => {
      entry.previewUrl = ev.target.result;
      renderQueueCard(entry, false);
      extractGPSLocal(file, (lat, lon) => {
        entry.latitude = lat; entry.longitude = lon;
        renderQueueCard(entry, true);
        updateGPSSummary();
      });
    };
    reader.readAsDataURL(file);
  });
  updateUploadBtn();
}

function renderQueueCard(entry, gpsResolved) {
  const card = document.getElementById(entry.qid);
  if (!card) return;
  const name = entry.file.name.length > 14 ? entry.file.name.slice(0, 11) + '…' : entry.file.name;
  const gpsHtml = !gpsResolved ? `<span class="queue-gps none">⏳</span>`
    : entry.latitude ? `<span class="queue-gps ok">📍 ${entry.latitude.toFixed(4)}</span>`
    : `<span class="queue-gps none">⚠ 無GPS</span>`;
  card.innerHTML = `
    <img class="queue-thumb" src="${entry.previewUrl}" alt=""
         onclick="event.stopPropagation();previewQueueItem('${entry.qid}')">
    <div class="queue-overlay">
      <span class="queue-name">${esc(name)}</span>${gpsHtml}
    </div>
    <button class="queue-remove" onclick="removeFromQueue('${entry.qid}')">✕</button>`;
}

function removeFromQueue(qid) {
  uploadQueue = uploadQueue.filter(e => e.qid !== qid);
  const card  = document.getElementById(qid);
  if (card) { card.style.transition = 'all .2s'; card.style.transform = 'scale(0)'; card.style.opacity = '0'; setTimeout(() => card.remove(), 220); }
  if (!uploadQueue.length) {
    document.getElementById('queue-grid').style.display = 'none';
    document.getElementById('drop-hint').style.display  = '';
  }
  updateGPSSummary(); updateUploadBtn();
}

function updateGPSSummary() {
  const t = uploadQueue.length;
  if (!t) { document.getElementById('batch-gps-summary').innerHTML = ''; return; }
  const g = uploadQueue.filter(e => e.latitude).length;
  document.getElementById('batch-gps-summary').innerHTML =
    `<span class="batch-stat all">📸 共 <strong>${t}</strong> 張</span>` +
    (g     ? `<span class="batch-stat gps-ok">📍 ${g} 張有定位</span>`   : '') +
    (t - g ? `<span class="batch-stat gps-none">⚠ ${t-g} 張無定位</span>` : '');
}

function updateUploadBtn() {
  const n = uploadQueue.length;
  document.getElementById('upload-btn-text').textContent = n > 0 ? `✅ 上傳全部 ${n} 張` : '✅ 確認上傳';
}

function previewQueueItem(qid) {
  const entry = uploadQueue.find(e => e.qid === qid);
  if (!entry) return;
  document.getElementById('lb-img').src            = entry.previewUrl;
  document.getElementById('lb-img').style.transform= 'scale(1)';
  document.getElementById('lb-img').classList.remove('zoomed');
  document.getElementById('lb-name').textContent   = entry.file.name;
  document.getElementById('lb-desc').textContent   = '';
  document.getElementById('lb-gps').textContent    = entry.latitude
    ? `📍 ${entry.latitude.toFixed(5)}°N,  ${entry.longitude.toFixed(5)}°E` : '';
  document.getElementById('lightbox').classList.add('open');
}

function extractGPSLocal(file, cb) {
  EXIF.getData(file, function() {
    try {
      const lat = EXIF.getTag(this,'GPSLatitude'),  latR = EXIF.getTag(this,'GPSLatitudeRef');
      const lon = EXIF.getTag(this,'GPSLongitude'), lonR = EXIF.getTag(this,'GPSLongitudeRef');
      if (lat && lon) {
        const d = v => v[0] + v[1]/60 + v[2]/3600;
        let la = d(lat), lo = d(lon);
        if (latR === 'S') la = -la; if (lonR === 'W') lo = -lo;
        cb(parseFloat(la.toFixed(6)), parseFloat(lo.toFixed(6)));
      } else { cb(null, null); }
    } catch(e) { cb(null, null); }
  });
}

async function doUpload() {
  if (!uploadQueue.length) {
    document.getElementById('upload-msg').textContent = '請先選取照片';
    document.getElementById('upload-msg').className   = 'auth-msg error';
    return;
  }
  const desc = document.getElementById('upload-desc').value.trim();
  const btn  = document.getElementById('upload-btn');
  btn.disabled = true;
  document.getElementById('upload-progress-wrap').classList.add('show');
  document.getElementById('upload-msg').textContent = '';

  const total    = uploadQueue.length;
  const formData = new FormData();
  formData.append('user_id', currentUser.id);
  formData.append('description', desc);
  uploadQueue.forEach(entry => formData.append('photos', entry.file));

  setProgress(0, total, `正在上傳 ${total} 張照片至伺服器…`);
  try {
    const res = await fetch(API + '/api/photos/upload', { method: 'POST', body: formData });
    const r   = await res.json();
    setProgress(total, total, r.message || '上傳完成');
    if (r.data && r.data.length) {
      r.data.forEach(addMarker);
      if (r.data.length === 1 && r.data[0].latitude)
        map.flyTo([r.data[0].latitude, r.data[0].longitude], 14, { duration: 1.0 });
      else if (r.data.length > 1) setTimeout(fitAllMarkers, 400);
    }
    if (r.errors && r.errors.length) {
      document.getElementById('upload-msg').textContent = '部分失敗：' + r.errors.join('；');
      document.getElementById('upload-msg').className   = 'auth-msg error';
    }
    await renderPhotoList();
    if (dbPanelOpen) loadDbStats();
    setTimeout(() => { closeUploadModal(); btn.disabled = false; }, 900);
  } catch(e) {
    setProgress(0, 1, '');
    document.getElementById('upload-msg').textContent = '上傳失敗：' + e.message;
    document.getElementById('upload-msg').className   = 'auth-msg error';
    btn.disabled = false;
  }
}

function setProgress(done, total, label) {
  document.getElementById('progress-fill').style.width  = `${Math.round(done / total * 100)}%`;
  document.getElementById('progress-label').textContent = label;
}

/* ═══════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════ */
let lbZoomed = false;

function openLightboxByPhoto(photo) {
  const src = photo.stored_name ? `${API}/photos/${photo.stored_name}` : photo.dataUrl;
  if (!src) return;
  lbZoomed = false;
  const img = document.getElementById('lb-img');
  img.src = src; img.style.transform = 'scale(1)'; img.classList.remove('zoomed');
  document.getElementById('lb-zoom-btn').textContent = '🔍';
  document.getElementById('lb-name').textContent = photo.filename || '';
  document.getElementById('lb-desc').textContent = photo.description || '';
  document.getElementById('lb-gps').textContent  = photo.latitude
    ? `📍 ${photo.latitude.toFixed(5)}°N,  ${photo.longitude.toFixed(5)}°E` : '';
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

function toggleZoom() {
  lbZoomed = !lbZoomed;
  const img = document.getElementById('lb-img');
  img.style.transform = lbZoomed ? 'scale(2.2)' : 'scale(1)';
  img.classList.toggle('zoomed', lbZoomed);
  document.getElementById('lb-zoom-btn').textContent = lbZoomed ? '🔎' : '🔍';
}

/* ═══════════════════════════════════════
   SIDEBAR TOGGLE
═══════════════════════════════════════ */
let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('toggle-sidebar').textContent = sidebarOpen ? '▶' : '◀';
  setTimeout(() => map.invalidateSize(), 320);
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); closeUploadModal(); }
});

/* ═══════════════════════════════════════
   APP INIT
═══════════════════════════════════════ */
const LOGO_B64 = document.querySelector('.auth-logo img').src;

function initApp() {
  initMap();
  renderPhotoList();
  loadDbStats();
}

window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('tfv_user');
  if (saved) { try { loginSuccess(JSON.parse(saved)); return; } catch(e) {} }
  document.getElementById('l-pass').addEventListener('keydown', e => e.key === 'Enter' && doLogin());
});
</script>
